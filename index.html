<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feri kórházban van már?</title>
  <meta name="description" content="Egyszerű oldal, ami megmondja: Feri kórházban van-e már." />
  <style>
    :root { --bg: #ffffff; --fg: #111111; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0b0b0b; --fg: #f5f5f5; }
    }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      display: grid;

      -moz-osx-font-smoothing: grayscale;

      font-size: clamp(24px, 5vw, 42px);

      margin: 0.5em 0 0;
      letter-spacing: -0.01em;
      user-select: none;
      overflow: visible;
      max-width: 700px;
      padding: 0 20px;
    }

    p.question { margin: 0; font-size: clamp(18px, 4vw, 28px); opacity: 0.65; }
    footer { position: fixed; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 12px; opacity: .5; }

  </style>
</head>
<body>
  <main>
    <p class="question" aria-hidden="true">Feri kórházban van már?</p>
    <h1>Feri március 18-án utalták be és aznap sikeresen meg is történt az átültetés. Még intenzív osztályon fekszik, de az orvosai szerint remekül halad a felépüléssel.</h1>
  </main>
